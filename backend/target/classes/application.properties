# ── Server ──────────────────────────────────────────────
server.port=8080

# ── Database (H2 for local dev; swap for Postgres in prod) ──
spring.datasource.url=jdbc:h2:mem:primetradedb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── PostgreSQL (uncomment for production) ──────────────
# spring.datasource.url=jdbc:postgresql://localhost:5432/primetradedb
# spring.datasource.username=postgres
# spring.datasource.password=yourpassword
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# spring.jpa.hibernate.ddl-auto=update

# ── JWT ─────────────────────────────────────────────────
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# ── Swagger ─────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ── CORS ────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173
